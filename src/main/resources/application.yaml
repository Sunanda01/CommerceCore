spring:
  application:
    name: CommerceCore
  main:
    banner-mode: off
  datasource:
    url: jdbc:mysql://localhost:3307/ecommerce
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          google:
            client-id:
            client-secret:
            scope: profile, email